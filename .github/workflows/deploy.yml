name: Node Remote Deploy

on:
  push:
    branches: [ main ] # Triggered whenever you push to main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/node-deploy-test
            git pull origin main
            npm install --production
            pm2 reload node_application || pm2 start server.js --name node_application