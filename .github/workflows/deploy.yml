name: Node Remote Deploy

on: 
  push: 
    branches: [main]

jobs:
  deploy:
    runs-on: ubantu-latest

    steps: 
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server vis SSh
        uses: appleboy/ssh-action@master
        with:
          host: ${{secrets.HOST}}
          username: ${{secrets.username}}
          key: ${{secrets.EC2_SSH_KEY}}
          script: 
            cd ~/node-deploy-test
            git pull origin main
            npm install --production
            pm2 reload node_application || pm2 start server.js --name node_application
